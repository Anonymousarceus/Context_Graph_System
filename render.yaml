# Render.com Deployment Configuration
# For separate deployments, use individual service repos or follow the manual steps below

# BACKEND DEPLOYMENT (Web Service)
# Service Type: Backend
# Runtime: Node
# Root Directory: ./backend
# Build Command: npm install
# Start Command: npm start
# Add Environment Variables:
#   - NODE_ENV: production
#   - MONGODB_URI: <your-mongodb-uri>
#   - GEMINI_API_KEY: <your-gemini-api-key>
#   - PORT: 3001

# FRONTEND DEPLOYMENT (Static Site or Web Service)
# Service Type: Frontend
# Runtime: Static Site (or Node for web service)
# Root Directory: ./frontend
# Build Command: npm install && npm run build
# Publish directory: dist
# Add Environment Variable:
#   - VITE_API_URL: https://context-graph-api.onrender.com/api

# RECOMMENDED: Deploy as two separate services
# 1. Backend: https://render.com/docs/deploy-node
# 2. Frontend: https://render.com/docs/static-sites
